<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ハートクイズ ～3人の想い～</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">
    <button id="btn-mute" class="btn-mute" title="ミュート切り替え">🔊</button>

    <!-- タイトル画面 -->
    <div id="screen-title" class="screen active">
      <div class="title-bg"></div>
      <div class="title-content">
        <div class="title-characters">
          <img src="assets/images/misaki.png" class="title-chara title-chara-left" alt="美咲">
          <img src="assets/images/hinata.png" class="title-chara title-chara-right" alt="ひなた">
          <img src="assets/images/rin.png" class="title-chara title-chara-center" alt="凛">
        </div>
        <div class="title-text-area">
          <h1 class="game-title">ハートクイズ</h1>
          <p class="game-subtitle">～3人の想い～</p>
          <button id="btn-start" class="btn btn-primary btn-glow">スタート</button>
          <button id="btn-stats" class="btn btn-secondary btn-stats-title">ステータス</button>
        </div>
      </div>
    </div>

    <!-- ヒロイン選択画面 -->
    <div id="screen-select" class="screen">
      <div class="select-bg"></div>
      <h2 class="screen-heading">ヒロインを選んでね</h2>
      <div id="heroine-cards" class="heroine-cards">
        <!-- JSで動的生成 -->
      </div>
      <button id="btn-back-title" class="btn btn-secondary">戻る</button>
    </div>

    <!-- ストーリー画面 -->
    <div id="screen-story" class="screen">
      <div class="story-bg" id="story-bg"></div>
      <div id="story-chara-container" class="story-chara-container">
        <img id="story-chara-img" class="story-chara-img" src="" alt="">
      </div>
      <div class="story-dialog-area">
        <div class="story-dialog-box">
          <div id="story-name-plate" class="story-name-plate"></div>
          <p id="story-text" class="story-text"></p>
        </div>
        <div class="story-controls">
          <span class="story-click-hint">Click / Tap</span>
        </div>
      </div>
    </div>

    <!-- クイズ画面 -->
    <div id="screen-quiz" class="screen">
      <div class="quiz-bg" id="quiz-bg"></div>
      <!-- ヒロインバストアップ -->
      <div id="quiz-chara-container" class="quiz-chara-container">
        <img id="quiz-chara-img" class="quiz-chara-img" src="" alt="">
      </div>
      <!-- フィードバック吹き出し（キャラ付近に表示） -->
      <div id="quiz-feedback" class="quiz-feedback hidden">
        <p id="feedback-text"></p>
        <p id="feedback-comment" class="feedback-comment"></p>
      </div>
      <!-- ステータスバー -->
      <div class="quiz-status-bar">
        <div class="quiz-heroine-info">
          <span id="quiz-heroine-name" class="heroine-name-label"></span>
          <div class="affinity-hearts">
            <span class="heart-icon">♥</span>
            <div class="affinity-bar-container">
              <div id="affinity-bar" class="affinity-bar"></div>
            </div>
            <span id="affinity-value" class="affinity-value">50</span>
          </div>
        </div>
        <div class="quiz-right-info">
          <div id="quiz-score-dots" class="quiz-score-dots">
            <!-- JSで動的生成 -->
          </div>
          <div class="timer-circle-container" id="timer-circle-container">
            <svg class="timer-circle-svg" viewBox="0 0 44 44">
              <circle class="timer-circle-bg" cx="22" cy="22" r="18"></circle>
              <circle id="timer-circle-bar" class="timer-circle-bar" cx="22" cy="22" r="18"
                stroke-dasharray="113.1" stroke-dashoffset="0"></circle>
            </svg>
            <span id="timer-text" class="timer-text">15</span>
          </div>
        </div>
      </div>
      <!-- ダイアログボックス -->
      <div class="vn-dialog-area">
        <div class="vn-dialog-box">
          <div id="vn-name-plate" class="vn-name-plate"></div>
          <p id="quiz-question" class="vn-dialog-text"></p>
        </div>
        <div id="quiz-choices" class="quiz-choices">
          <!-- JSで動的生成 -->
        </div>
      </div>
    </div>

    <!-- 結果画面 -->
    <div id="screen-result" class="screen">
      <div class="result-bg" id="result-bg"></div>
      <div class="result-content">
        <div class="result-chara-container">
          <img id="result-chara-img" class="result-chara-img" src="" alt="">
        </div>
        <div class="result-text-area">
          <h2 id="result-ending-type" class="ending-type"></h2>
          <div class="result-name-plate">
            <p id="result-heroine-name" class="result-heroine-name"></p>
          </div>
          <div class="result-dialog-box">
            <p id="result-message" class="result-message"></p>
          </div>
          <div class="result-stats">
            <p>最終親密度: <span class="heart-icon">♥</span> <span id="result-affinity" class="result-affinity-value"></span></p>
            <p>正解数: <span id="result-correct" class="result-correct-value"></span> / <span id="result-total-q"></span></p>
          </div>
          <div class="result-buttons">
            <button id="btn-retry" class="btn btn-primary">もう一度</button>
            <button id="btn-back-title-result" class="btn btn-secondary">タイトルへ</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ステータス画面 -->
    <div id="screen-stats" class="screen">
      <div class="stats-bg"></div>
      <h2 class="screen-heading">ステータス</h2>
      <div class="stats-tabs" id="stats-tabs">
        <!-- JSで動的生成 -->
      </div>
      <div class="stats-content" id="stats-content">
        <!-- JSで動的生成（キャラ別クリア回数） -->
      </div>
      <div class="stats-global-categories" id="stats-global-categories">
        <!-- JSで動的生成（全体カテゴリ別正解率） -->
      </div>
      <div class="stats-buttons">
        <button id="btn-stats-reset" class="btn btn-danger-small">データリセット</button>
        <button id="btn-back-title-stats" class="btn btn-secondary">戻る</button>
      </div>
    </div>

  </div>

  <script src="js/stats.js"></script>
  <script src="js/player.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
