<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ハートクイズ ～3人の想い～</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">

    <!-- タイトル画面 -->
    <div id="screen-title" class="screen active">
      <div class="title-content">
        <h1 class="game-title">ハートクイズ</h1>
        <p class="game-subtitle">～3人の想い～</p>
        <button id="btn-start" class="btn btn-primary">スタート</button>
      </div>
    </div>

    <!-- ヒロイン選択画面 -->
    <div id="screen-select" class="screen">
      <h2 class="screen-heading">ヒロインを選んでね</h2>
      <div id="heroine-cards" class="heroine-cards">
        <!-- JSで動的生成 -->
      </div>
      <button id="btn-back-title" class="btn btn-secondary">戻る</button>
    </div>

    <!-- クイズ画面 -->
    <div id="screen-quiz" class="screen">
      <div class="quiz-header">
        <div class="quiz-heroine-info">
          <span id="quiz-heroine-name" class="heroine-name-label"></span>
          <div class="affinity-bar-container">
            <div id="affinity-bar" class="affinity-bar"></div>
          </div>
          <span id="affinity-value" class="affinity-value">50</span>
        </div>
        <div class="quiz-progress">
          <span id="quiz-number">1</span> / <span id="quiz-total">10</span>
        </div>
        <div class="timer-container">
          <div id="timer-bar" class="timer-bar"></div>
        </div>
      </div>
      <div class="quiz-body">
        <div id="heroine-display" class="heroine-display">
          <div id="heroine-avatar" class="heroine-avatar"></div>
          <div id="heroine-dialog" class="heroine-dialog">
            <p id="quiz-question" class="quiz-question-text"></p>
          </div>
        </div>
        <div id="quiz-choices" class="quiz-choices">
          <!-- JSで動的生成 -->
        </div>
      </div>
      <div id="quiz-feedback" class="quiz-feedback hidden">
        <p id="feedback-text"></p>
        <p id="feedback-comment" class="feedback-comment"></p>
      </div>
    </div>

    <!-- 結果画面 -->
    <div id="screen-result" class="screen">
      <div class="result-content">
        <div id="result-heroine-avatar" class="heroine-avatar large"></div>
        <h2 id="result-ending-type" class="ending-type"></h2>
        <p id="result-heroine-name" class="result-heroine-name"></p>
        <p id="result-message" class="result-message"></p>
        <div class="result-stats">
          <p>最終親密度: <span id="result-affinity" class="result-affinity-value"></span></p>
          <p>正解数: <span id="result-correct" class="result-correct-value"></span> / <span id="result-total-q"></span></p>
        </div>
        <div class="result-buttons">
          <button id="btn-retry" class="btn btn-primary">もう一度</button>
          <button id="btn-back-title-result" class="btn btn-secondary">タイトルへ</button>
        </div>
      </div>
    </div>

  </div>

  <script src="js/player.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
