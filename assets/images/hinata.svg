  <path d="M132,280 Q128,295 133,310" fill="none" stroke="#E0C090" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <path d="M268,280 Q272,295 267,310" fill="none" stroke="#E0C090" stroke-width="2" opacity="0.3" stroke-linecap="round"/>

