  <path d="M155,210 Q158,205 162,208" stroke="#6A5530" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M159,207 Q163,202 167,206" stroke="#6A5530" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M186,205 Q190,202 193,207" stroke="#6A5530" stroke-width="1.8" fill="none" stroke-linecap="round"/>
