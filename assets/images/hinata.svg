  <path d="M187,336 L200,358 L213,336 L207,348 L200,336 L193,348 Z" fill="url(#ribbonGradH)"/>
  <circle cx="200" cy="346" r="5" fill="#408040"/>
  <circle cx="200" cy="346" r="2" fill="#80C080" opacity="0.6"/>

