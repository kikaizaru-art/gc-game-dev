  <path d="M148,210 Q148,168 158,148 Q173,118 200,113 Q227,118 242,148 Q252,168 252,210 Q252,260 238,284 Q224,310 200,317 Q176,310 162,284 Q148,260 148,210 Z" fill="url(#skinH)" filter="url(#softShadowH)"/>

