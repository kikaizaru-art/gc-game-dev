  <path d="M118,350 Q112,360 115,380 Q118,395 125,400 Q120,385 122,370 Q124,355 118,350 Z" fill="#B07840" opacity="0.5"/>
  <path d="M282,350 Q288,360 285,380 Q282,395 275,400 Q280,385 278,370 Q276,355 282,350 Z" fill="#B07840" opacity="0.5"/>

  <!-- 首 -->
