<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <radialGradient id="skinH" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFF2E8"/>
      <stop offset="100%" stop-color="#F8DCC8"/>
    </radialGradient>
    <radialGradient id="hairGradH" cx="40%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="40%" stop-color="#C08850"/>
      <stop offset="100%" stop-color="#9A6830"/>
    </radialGradient>
    <radialGradient id="eyeGradH" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#A0D8A0"/>
      <stop offset="50%" stop-color="#7BC67E"/>
      <stop offset="100%" stop-color="#4A9050"/>
    </radialGradient>
    <linearGradient id="uniformGradH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0EEF0"/>
    </linearGradient>
    <linearGradient id="ribbonGradH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90D090"/>
      <stop offset="100%" stop-color="#60A060"/>
    </linearGradient>
    <filter id="softShadowH">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- 後ろ髪（ふわふわウェーブ） -->
