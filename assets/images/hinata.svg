  <ellipse cx="225" cy="224" rx="17" ry="18" fill="url(#eyeGradH)"/>
  <ellipse cx="225" cy="228" rx="11" ry="12" fill="#4A9050"/>
  <ellipse cx="225" cy="232" rx="7" ry="7" fill="#2A6030"/>
  <circle cx="218" cy="216" r="5.5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="230" cy="220" r="2.5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="222" cy="234" r="3.5" fill="#FFFFFF" opacity="0.25"/>
  <path d="M205,210 Q208,205 212,208" stroke="#6A5530" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M209,207 Q213,202 217,206" stroke="#6A5530" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M236,205 Q240,202 243,207" stroke="#6A5530" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M205,212 Q212,202 228,200 Q240,203 245,214" fill="none" stroke="#6A5530" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M228,240 Q233,243 238,241" fill="none" stroke="#90A080" stroke-width="1.2" stroke-linecap="round"/>

  <!-- チーク -->
  <ellipse cx="158" cy="250" rx="16" ry="9" fill="#FFBBA0" opacity="0.35"/>
  <ellipse cx="242" cy="250" rx="16" ry="9" fill="#FFBBA0" opacity="0.35"/>

  <!-- 鼻 -->
  <path d="M198,247 Q200,251 202,247" fill="none" stroke="#E0BCA0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 口（やさしい微笑み） -->
  <path d="M188,272 Q194,278 200,279 Q206,278 212,272" fill="none" stroke="#D09080" stroke-width="2" stroke-linecap="round"/>
  <path d="M192,273 Q196,277 200,278 Q204,277 208,273" fill="#FFA890" opacity="0.25"/>

  <!-- 髪飾り（ヒマワリ） -->
  <g transform="translate(250, 172) rotate(15)">
    <circle cx="0" cy="0" r="11" fill="#FFE060"/>
    <ellipse cx="0" cy="-12" rx="5" ry="7" fill="#FFD000" transform="rotate(0)"/>
    <ellipse cx="0" cy="-12" rx="5" ry="7" fill="#FFD000" transform="rotate(45)"/>
    <ellipse cx="0" cy="-12" rx="5" ry="7" fill="#FFD000" transform="rotate(90)"/>
    <ellipse cx="0" cy="-12" rx="5" ry="7" fill="#FFD000" transform="rotate(135)"/>
    <ellipse cx="0" cy="-12" rx="5" ry="7" fill="#FFD000" transform="rotate(180)"/>
    <ellipse cx="0" cy="-12" rx="5" ry="7" fill="#FFD000" transform="rotate(225)"/>
    <ellipse cx="0" cy="-12" rx="5" ry="7" fill="#FFD000" transform="rotate(270)"/>
    <ellipse cx="0" cy="-12" rx="5" ry="7" fill="#FFD000" transform="rotate(315)"/>
    <circle cx="0" cy="0" r="6" fill="#8B6914"/>
    <circle cx="-2" cy="-2" r="1.5" fill="#A08020" opacity="0.6"/>
    <circle cx="2" cy="1" r="1" fill="#A08020" opacity="0.6"/>
