  <ellipse cx="175" cy="224" rx="17" ry="18" fill="url(#eyeGradH)"/>
  <ellipse cx="175" cy="228" rx="11" ry="12" fill="#4A9050"/>
  <ellipse cx="175" cy="232" rx="7" ry="7" fill="#2A6030"/>
