  <path d="M135,356 Q140,338 172,330 L180,330 L180,358 Q182,418 177,520 L135,520 Q118,518 112,498 Q102,458 107,418 Q112,388 135,356 Z" fill="url(#uniformGradH)" filter="url(#softShadowH)"/>
  <path d="M265,356 Q260,338 228,330 L220,330 L220,358 Q218,418 223,520 L265,520 Q282,518 288,498 Q298,458 293,418 Q288,388 265,356 Z" fill="url(#uniformGradH)" filter="url(#softShadowH)"/>
  <path d="M180,356 Q196,396 200,413 Q204,396 220,356 L220,330 L180,330 Z" fill="#E8E4E8" opacity="0.25"/>
  <path d="M172,330 L200,388 L228,330" fill="none" stroke="#E0D8E0" stroke-width="1.5"/>
  <!-- セーラー衿 -->
  <path d="M158,340 Q148,336 143,350 Q138,366 143,376 L172,351 Z" fill="#5B7DB8" opacity="0.85"/>
  <path d="M242,340 Q252,336 257,350 Q262,366 257,376 L228,351 Z" fill="#5B7DB8" opacity="0.85"/>
