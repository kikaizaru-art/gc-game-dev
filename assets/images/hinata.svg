  <path d="M275,205 Q290,250 292,310 Q295,370 288,430 Q285,460 278,470 Q270,475 268,460 Q275,420 278,360 Q280,300 272,240 Q268,215 258,200 Z" fill="url(#hairGradH)" opacity="0.85"/>
