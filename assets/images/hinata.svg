  <path d="M168,138 Q180,122 196,130 Q204,122 218,128" fill="none" stroke="#E0C090" stroke-width="3.5" opacity="0.45" stroke-linecap="round"/>
  <path d="M150,162 Q158,148 168,155" fill="none" stroke="#E0C090" stroke-width="2.5" opacity="0.35" stroke-linecap="round"/>

