  <path d="M142,198 Q134,225 130,265 Q128,300 132,335 Q134,350 138,355 Q145,358 145,348 Q140,320 140,280 Q141,240 148,210 Z" fill="url(#hairGradH)"/>
  <path d="M258,198 Q266,225 270,265 Q272,300 268,335 Q266,350 262,355 Q255,358 255,348 Q260,320 260,280 Q259,240 252,210 Z" fill="url(#hairGradH)"/>
