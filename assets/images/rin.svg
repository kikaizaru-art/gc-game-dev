<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <radialGradient id="skinR" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFF0E6"/>
      <stop offset="100%" stop-color="#F5DDCC"/>
    </radialGradient>
    <radialGradient id="hairGradR" cx="40%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#4A6FA5"/>
      <stop offset="40%" stop-color="#2D4A7A"/>
      <stop offset="100%" stop-color="#1A2F55"/>
    </radialGradient>
    <radialGradient id="eyeGradR" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#7AB0E0"/>
      <stop offset="50%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2A60A0"/>
    </radialGradient>
    <linearGradient id="uniformGradR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0EEF0"/>
    </linearGradient>
    <linearGradient id="ribbonGradR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6090C0"/>
      <stop offset="100%" stop-color="#3060A0"/>
    </linearGradient>
    <filter id="softShadowR">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- 後ろ髪（ロングストレート） -->
  <path d="M128,200 Q115,260 110,340 Q105,420 108,500 Q110,530 115,550 Q125,570 130,560 Q120,500 118,420 Q118,340 125,260 Q130,220 140,200 Z" fill="url(#hairGradR)" opacity="0.9"/>
  <path d="M272,200 Q285,260 290,340 Q295,420 292,500 Q290,530 285,550 Q275,570 270,560 Q280,500 282,420 Q282,340 275,260 Q270,220 260,200 Z" fill="url(#hairGradR)" opacity="0.9"/>
  <!-- 中央後ろ髪 -->
  <path d="M160,310 Q170,400 165,500 Q163,530 168,540 Q175,545 178,530 Q180,480 175,400 Q172,340 175,310 Z" fill="url(#hairGradR)" opacity="0.7"/>
  <path d="M240,310 Q230,400 235,500 Q237,530 232,540 Q225,545 222,530 Q220,480 225,400 Q228,340 225,310 Z" fill="url(#hairGradR)" opacity="0.7"/>

  <!-- 首 -->
  <rect x="180" y="310" width="40" height="48" rx="8" fill="url(#skinR)"/>
  <ellipse cx="200" cy="315" rx="20" ry="5" fill="#E8C8B0" opacity="0.35"/>

  <!-- 体（制服ブラウス） -->
  <path d="M135,358 Q140,340 172,332 L180,332 L180,360 Q182,420 177,520 L135,520 Q118,518 112,498 Q102,458 107,418 Q112,388 135,358 Z" fill="url(#uniformGradR)" filter="url(#softShadowR)"/>
  <path d="M265,358 Q260,340 228,332 L220,332 L220,360 Q218,420 223,520 L265,520 Q282,518 288,498 Q298,458 293,418 Q288,388 265,358 Z" fill="url(#uniformGradR)" filter="url(#softShadowR)"/>
  <!-- 胸元 -->
  <path d="M180,358 Q196,398 200,415 Q204,398 220,358 L220,332 L180,332 Z" fill="#E8E4E8" opacity="0.25"/>
  <!-- 制服の衿 -->
  <path d="M172,332 L200,390 L228,332" fill="none" stroke="#E0D8E0" stroke-width="1.5"/>
  <!-- セーラー衿 -->
  <path d="M158,342 Q148,338 143,352 Q138,368 143,378 L172,353 Z" fill="#5B7DB8" opacity="0.85"/>
  <path d="M242,342 Q252,338 257,352 Q262,368 257,378 L228,353 Z" fill="#5B7DB8" opacity="0.85"/>
  <path d="M145,373 L170,350" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  <path d="M255,373 L230,350" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>

  <!-- リボン -->
  <path d="M187,338 L200,360 L213,338 L207,350 L200,338 L193,350 Z" fill="url(#ribbonGradR)"/>
  <circle cx="200" cy="348" r="5" fill="#2050A0"/>
  <circle cx="200" cy="348" r="2" fill="#5090D0" opacity="0.6"/>

  <!-- 顔 -->
  <path d="M148,208 Q148,168 158,148 Q173,118 200,112 Q227,118 242,148 Q252,168 252,208 Q252,258 238,282 Q224,308 200,315 Q176,308 162,282 Q148,258 148,208 Z" fill="url(#skinR)" filter="url(#softShadowR)"/>

