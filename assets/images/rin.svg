  <ellipse cx="150" cy="222" rx="9" ry="14" fill="#F5DDCC"/>
  <ellipse cx="152" cy="222" rx="4" ry="8" fill="#FFBBA8" opacity="0.35"/>
  <ellipse cx="250" cy="222" rx="9" ry="14" fill="#F5DDCC"/>
  <ellipse cx="248" cy="222" rx="4" ry="8" fill="#FFBBA8" opacity="0.35"/>

  <!-- 前髪（ぱっつん気味、知的） -->
  <path d="M142,195 Q144,140 162,116 Q178,96 200,92 Q222,96 238,116 Q256,140 258,195 Q254,185 248,182 Q244,188 238,183 Q232,190 225,184 Q218,190 210,185 Q202,190 195,185 Q188,190 180,184 Q172,190 165,183 Q158,188 152,182 Q148,186 142,195 Z" fill="url(#hairGradR)"/>
  <!-- 前髪のハイライト -->
  <path d="M175,132 Q185,118 198,125 Q205,118 215,122" fill="none" stroke="#6090C0" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
  <path d="M155,155 Q162,142 172,148" fill="none" stroke="#6090C0" stroke-width="2" opacity="0.3" stroke-linecap="round"/>

  <!-- サイド髪 -->
  <path d="M142,195 Q135,220 132,260 Q130,300 135,330 Q137,340 140,335 Q138,300 140,260 Q142,230 148,205 Z" fill="url(#hairGradR)"/>
  <path d="M258,195 Q265,220 268,260 Q270,300 265,330 Q263,340 260,335 Q262,300 260,260 Q258,230 252,205 Z" fill="url(#hairGradR)"/>

  <!-- 眉毛（きりっとした） -->
  <path d="M160,196 Q170,189 186,193" fill="none" stroke="#2A3A55" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M214,193 Q230,189 240,196" fill="none" stroke="#2A3A55" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 目（左）- クール系の大きな目 -->
  <ellipse cx="175" cy="220" rx="21" ry="22" fill="#FFFFFF"/>
  <ellipse cx="175" cy="222" rx="17" ry="18" fill="url(#eyeGradR)"/>
  <ellipse cx="175" cy="226" rx="11" ry="12" fill="#2A60A0"/>
  <ellipse cx="175" cy="230" rx="7" ry="7" fill="#1A3A70"/>
  <!-- ハイライト -->
  <circle cx="168" cy="214" r="5.5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="180" cy="218" r="2.5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="172" cy="232" r="3.5" fill="#FFFFFF" opacity="0.25"/>
  <!-- まつ毛 -->
  <path d="M154,208 Q158,202 162,206" stroke="#1A2F55" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M158,204 Q163,198 168,203" stroke="#1A2F55" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M186,202 Q191,198 195,204" stroke="#1A2F55" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- アイライン -->
  <path d="M154,210 Q162,198 178,196 Q192,198 196,208" fill="none" stroke="#1A2F55" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M162,238 Q167,241 172,239" fill="none" stroke="#7090A0" stroke-width="1.2" stroke-linecap="round"/>

  <!-- 目（右） -->
  <ellipse cx="225" cy="220" rx="21" ry="22" fill="#FFFFFF"/>
  <ellipse cx="225" cy="222" rx="17" ry="18" fill="url(#eyeGradR)"/>
  <ellipse cx="225" cy="226" rx="11" ry="12" fill="#2A60A0"/>
  <ellipse cx="225" cy="230" rx="7" ry="7" fill="#1A3A70"/>
  <circle cx="218" cy="214" r="5.5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="230" cy="218" r="2.5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="222" cy="232" r="3.5" fill="#FFFFFF" opacity="0.25"/>
  <path d="M204,208 Q208,202 212,206" stroke="#1A2F55" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M208,204 Q213,198 218,203" stroke="#1A2F55" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M236,202 Q241,198 245,204" stroke="#1A2F55" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M204,210 Q212,198 228,196 Q242,198 246,208" fill="none" stroke="#1A2F55" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M228,238 Q233,241 238,239" fill="none" stroke="#7090A0" stroke-width="1.2" stroke-linecap="round"/>

  <!-- メガネ -->
  <ellipse cx="175" cy="220" rx="28" ry="26" fill="none" stroke="#3A5A8A" stroke-width="2" opacity="0.6"/>
  <ellipse cx="225" cy="220" rx="28" ry="26" fill="none" stroke="#3A5A8A" stroke-width="2" opacity="0.6"/>
  <path d="M197,218 Q200,215 203,218" fill="none" stroke="#3A5A8A" stroke-width="1.5" opacity="0.6"/>
  <path d="M147,216 L140,212" stroke="#3A5A8A" stroke-width="1.5" opacity="0.6"/>
  <path d="M253,216 L260,212" stroke="#3A5A8A" stroke-width="1.5" opacity="0.6"/>
  <!-- メガネの反射 -->
  <path d="M158,208 Q165,203 170,208" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.2"/>
  <path d="M208,208 Q215,203 220,208" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.2"/>

  <!-- チーク -->
  <ellipse cx="158" cy="248" rx="14" ry="8" fill="#FFB8C0" opacity="0.2"/>
  <ellipse cx="242" cy="248" rx="14" ry="8" fill="#FFB8C0" opacity="0.2"/>

  <!-- 鼻 -->
  <path d="M198,245 Q200,249 202,245" fill="none" stroke="#E0BCA8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 口（クールな微笑み） -->
  <path d="M188,270 Q194,276 200,277 Q206,276 212,270" fill="none" stroke="#D08080" stroke-width="2" stroke-linecap="round"/>

  <!-- 髪飾り（月のモチーフ） -->
  <g transform="translate(255, 170) rotate(20)">
    <path d="M0,-12 Q-8,-8 -8,0 Q-8,8 0,12 Q-4,8 -4,0 Q-4,-8 0,-12 Z" fill="#FFD700" opacity="0.9"/>
    <circle cx="4" cy="-8" r="1.5" fill="#FFE860"/>
    <circle cx="6" cy="0" r="1" fill="#FFE860"/>
  </g>
</svg>